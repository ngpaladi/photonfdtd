name: Publish to PyPI

# Publish a release to PyPI. Triggered only when a GitHub Release is published
# (i.e. a deliberate version bump + release), never on ordinary pushes.
#
# Uses PyPI Trusted Publishing (OIDC) -- no API token secret. One-time setup on
# PyPI is required before the first release (see the repository README / the
# note at the bottom of this file).
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.guard.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build ".[test]"

      # Gate: never publish a release whose code fails its own tests. This also
      # runs the version-sync guard (pyproject.toml == photonfdtd.__version__).
      - name: Run tests
        run: pytest

      # Guard: the published version must match the release tag, so the GitHub
      # release version always corresponds to what lands on PyPI. Tags are
      # expected as `vX.Y.Z`; the leading `v` is optional.
      - name: Check release tag matches package version
        id: guard
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          PKG_VERSION="$(python -c 'import photonfdtd; print(photonfdtd.__version__)')"
          TAG_VERSION="${RELEASE_TAG#v}"
          echo "release tag:     ${RELEASE_TAG} (-> ${TAG_VERSION})"
          echo "package version: ${PKG_VERSION}"
          if [ "${TAG_VERSION}" != "${PKG_VERSION}" ]; then
            echo "::error::Release tag '${RELEASE_TAG}' does not match package version '${PKG_VERSION}'. Bump pyproject.toml + __init__.py and re-tag."
            exit 1
          fi
          echo "version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/photonfdtd/${{ needs.build.outputs.version }}/
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  verify:
    needs: [build, publish]
    runs-on: ubuntu-latest
    steps:
      # Post-publish: confirm the GitHub release version actually corresponds to
      # a live PyPI version by polling the JSON API until it appears.
      - name: Wait for the version to appear on PyPI
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          url="https://pypi.org/pypi/photonfdtd/${VERSION}/json"
          echo "Polling ${url}"
          for attempt in $(seq 1 30); do
            code="$(curl -sS -o /dev/null -w '%{http_code}' "$url")"
            if [ "$code" = "200" ]; then
              echo "photonfdtd ${VERSION} is live on PyPI."
              exit 0
            fi
            echo "attempt ${attempt}: HTTP ${code}, retrying in 10s..."
            sleep 10
          done
          echo "::error::photonfdtd ${VERSION} did not appear on PyPI within the timeout."
          exit 1
